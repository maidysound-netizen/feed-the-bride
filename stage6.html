    {id:'fusion',    name:'核融合エネルギードリンク',   cost:9000, hunger:-70,emoji:'🔥',quote:'熱い。とても。',      fedW:1},
    {id:'bigbang',   name:'ビッグバン残存エネルギー',   cost:10000,hunger:-75,emoji:'💥',quote:'…太初の味。',        fedW:1},
    {id:'alienbox',  name:'宇宙人弁当',                cost:8500, hunger:-68,emoji:'👽',quote:'…美味しい。',         fedW:1},
    {id:'stardust',  name:'宇宙塵圧縮栄養剤',          cost:7500, hunger:-62,emoji:'✨',quote:'合理的だ。',          fedW:1},
    {id:'neutron',   name:'中性子星濃縮液',             cost:12000,hunger:-80,emoji:'⭐',quote:'これはYesだ。',      fedW:2,special:'neutron'},
    {id:'sportsbento',name:'宇宙スポーツ特別弁当',     cost:15000,hunger:-90,emoji:'🏆',quote:'「…これで優勝できる。」',fedW:2,special:'sportsbento'},
  ],
};

var UPGRADES=[
  {id:'cern',      name:{kr:'CERN급 연구비',          en:'CERN Research Fund',        jp:'CERN級研究費'},          cost:10000, incomeBonus:200, desc:{kr:'+200원/초', en:'+200 won/sec',jp:'+200円/秒'}},
  {id:'darkpatent',name:{kr:'암흑물질 특허 출원',      en:'Dark Matter Patent',        jp:'暗黒物質特許出願'},       cost:30000, incomeBonus:500, desc:{kr:'+500원/초', en:'+500 won/sec',jp:'+500円/秒'}},
  {id:'alientech', name:{kr:'외계 문명 기술 중개료',   en:'Alien Tech Brokerage',      jp:'宇宙人技術仲介料'},       cost:80000, incomeBonus:1200,desc:{kr:'+1200원/초',en:'+1200 won/sec',jp:'+1200円/秒'}},
  {id:'planet_1',  name:{kr:'행성급 급식 시스템 Lv1', en:'Planetary Feeder Lv1',      jp:'惑星級給食Lv1'},          cost:20000, autoFeed:'radiation', autoInterval:20000,desc:{kr:'20초마다 방사능',en:'Radiation/20s',jp:'20秒ごと'}},
  {id:'planet_2',  name:{kr:'행성급 급식 시스템 Lv2', en:'Planetary Feeder Lv2',      jp:'惑星級給食Lv2'},          cost:50000, autoFeed:'neutron',   autoInterval:15000,desc:{kr:'15초마다 중성자별',en:'Neutron/15s',jp:'15秒ごと'}},
  {id:'planet_3',  name:{kr:'행성급 급식 시스템 Lv3', en:'Planetary Feeder Lv3',      jp:'惑星級給食Lv3'},          cost:100000,autoFeed:'sportsbento',autoInterval:10000,desc:{kr:'10초마다 스포츠 도시락',en:'Sports bento/10s',jp:'10秒ごと'}},
];

var G={
  lang:lsGet(LS.lang,'kr'),money:lsGet(LS.money,10),income:lsGet(LS.income,2),
  upgrades:lsGet(LS.upgrades,{}),fedCount:lsGet(LS.fedCount,0),totalEarned:lsGet(LS.totalEarned,0),
  hunger:50,gameOver:false,lastMysteryAt:-1,logs:[],autoTimers:{},
};

function L(k){return LD[G.lang][k];}
function loc(o){return typeof o==='object'?(o[G.lang]||o.kr):o;}
function getFoods(){return FOODS[G.lang]||FOODS.kr;}
function getBrideState(){var s=L('brideStates'),c=s[0];for(var i=0;i<s.length;i++){if(G.hunger>=s[i].t)c=s[i];}return c;}
function addLog(t){G.logs.push(t);if(G.logs.length>50)G.logs.shift();renderLog();}

function showEnding(){
  var d=LD[G.lang];
  var endingEl=document.getElementById('ending');
  var textEl=document.getElementById('ending-text');
  endingEl.style.display='flex';
  bgm.pause();
  showEvent('videos/event_ending.mp4');
  setTimeout(function(){
    var lines=[d.ending1,d.ending2,d.ending3];
    var i=0;
    function showNext(){
      if(i>=lines.length)return;
      var line=document.createElement('div');
      line.style.cssText='color:'+(i===0?'#ffffff':i===1?'#ffd700':'#aaaaaa')+';font-size:'+(i===0?'1.5rem':i===1?'1rem':'0.85rem')+';opacity:0;transition:opacity 1s;font-style:'+(i===2?'italic':'normal')+';';
      line.textContent=lines[i];
      textEl.appendChild(line);
      setTimeout(function(){line.style.opacity='1';},100);
      i++;
      setTimeout(showNext,2500);
    }
    showNext();
  },3000);
}

function feedFood(food){
  if(G.gameOver)return;
  var d=LD[G.lang];
  if(G.money<food.cost){addLog(d.noMoney(food.name,food.cost));return;}
  G.money=parseFloat((G.money-food.cost).toFixed(1));
  G.fedCount=parseFloat((G.fedCount+(food.fedW||1)).toFixed(1));
  G.hunger=parseFloat(Math.max(0,G.hunger+food.hunger).toFixed(1));
  addLog(d.feedLog(food.emoji,food.name,food.quote));
  if(food.special==='neutron'){setTimeout(function(){addLog({kr:'⭐ 중성자별 에너지... 중력이 달라진 것 같다.',en:'⭐ Neutron star energy... gravity feels different.',jp:'⭐ 中性子星エネルギー…重力が変わった気がする。'}[G.lang]);},800);}
  if(food.special==='sportsbento'){setTimeout(function(){addLog({kr:'🏆 "...이거면 우승할 수 있어."',en:'🏆 "...With this I can win."',jp:'🏆 「…これで優勝できる。」'}[G.lang]);},800);}
  var fedInt=Math.floor(G.fedCount);
  var mystery=L('mystery');
  if(mystery[fedInt]&&G.lastMysteryAt!==fedInt){G.lastMysteryAt=fedInt;addLog('신부: '+mystery[fedInt]);}
  if(G.fedCount>=2000){showEnding();return;}
  lsSave();renderBride();renderStats();renderFoods();renderUpgrades();
}

function buyUpgrade(up){
  if(G.gameOver||G.upgrades[up.id])return;
  var d=LD[G.lang];var name=loc(up.name);
  if(G.money<up.cost){addLog(d.noUpg(up.cost));return;}
  G.money=parseFloat((G.money-up.cost).toFixed(1));
  G.upgrades[up.id]=true;
  if(up.incomeBonus){G.income=parseFloat((G.income+up.incomeBonus).toFixed(1));addLog(d.buyUpg(name,up.incomeBonus));}
  if(up.autoFeed){
    var foods=getFoods();var food=null;
    for(var i=0;i<foods.length;i++){if(foods[i].id===up.autoFeed){food=foods[i];break;}}
    if(food){(function(f){G.autoTimers[up.id]=setInterval(function(){feedFood(f);},up.autoInterval);})(food);addLog(d.autoStart(name,food.name));}
  }
  lsSave();renderStats();renderUpgrades();
}

function gameLoop(){
  if(G.gameOver)return;
  G.money=parseFloat((G.money+G.income).toFixed(1));
  G.totalEarned=parseFloat((G.totalEarned+G.income).toFixed(1));
  var rate=5.5;
  G.hunger=parseFloat(Math.min(100,G.hunger+rate).toFixed(1));
  if(G.hunger>=100){G.gameOver=true;showEvent('videos/event_gameover.mp4');renderGameOver();return;}
  lsSave();renderStats();renderBride();renderUpgrades();
}

function randomLog(){
  if(G.gameOver)return;
  var logs=L('randLogs');
  var pool=G.hunger<40?logs.early:G.hunger<65?logs.mid:G.hunger<80?logs.danger:logs.critical;
  addLog(pool[Math.floor(Math.random()*pool.length)]);
}

function restartGame(){
  Object.keys(G.autoTimers).forEach(function(k){clearInterval(G.autoTimers[k]);});
  G.money=10;G.income=2;G.fedCount=0;G.totalEarned=0;
  G.upgrades={};G.autoTimers={};G.hunger=50;G.gameOver=false;
  lsSet('ftb_stage',1);lsSave();window.location.href='index.html';
}

function playVideo(src,onDone){
  var done=false;
  function finish(){if(done)return;done=true;closeEvent();onDone();}
  eventVid.onended=finish;eventVid.onerror=finish;
  eventVid.src=BASE+src;eventOverlay.style.display='block';
  eventVid.play().catch(function(){finish();});
  setTimeout(function(){finish();},30000);
}

function playNarration(cb){
  var introEl=document.getElementById('s6-intro');
  var narEl=document.getElementById('s6-narration');
  var d=LD[G.lang];
  introEl.style.display='flex';introEl.style.background='#000';
  narEl.style.opacity='0';narEl.style.color='#e8dcc8';
  var lines=d.narration.split('\n');
  narEl.innerHTML=lines.map(function(l){return '<div>'+l+'</div>';}).join('');
  document.body.style.animation='shake 0.6s ease';
  setTimeout(function(){document.body.style.animation='';},600);
  setTimeout(function(){narEl.style.opacity='1';},300);
  setTimeout(function(){introEl.style.background='rgba(0,0,0,0.97)';narEl.style.color='#ffffff';},1800);
  setTimeout(function(){narEl.innerHTML+='<div style="margin-top:20px;color:#ffd700;font-size:1.1rem;font-style:normal;font-weight:bold;">'+d.quote+'</div>';},3000);
  setTimeout(function(){
    introEl.style.transition='opacity 1s';introEl.style.opacity='0';
    setTimeout(function(){introEl.style.display='none';introEl.style.opacity='1';introEl.style.transition='';cb();},1000);
  },5000);
}

function playIntro(cb){
  playVideo('videos/event_stage6_intro.mp4',function(){
    playNarration(function(){
      playVideo('videos/event_stage6_outro.mp4',function(){cb();});
    });
  });
}

function renderAll(){renderLangTabs();renderHeader();renderBride();renderStats();renderFoods();renderUpgrades();renderLog();renderGameOver();}

function renderLangTabs(){
  var el=document.getElementById('lang-tabs');el.innerHTML='';
  ['kr','en','jp'].forEach(function(lang){
    var btn=document.createElement('button');btn.textContent=LD[lang].tab;
    var a=lang===G.lang;
    btn.style.cssText='flex:1;padding:8px;background:'+(a?'rgba(255,255,255,0.1)':'transparent')+';border:'+(a?'1px solid #ffffff44':'1px solid transparent')+';border-radius:6px;color:'+(a?'#ffffff':'#444444')+';cursor:pointer;font-size:0.8rem;font-family:Georgia,serif;';
    btn.addEventListener('click',function(){G.lang=lang;lsSet(LS.lang,lang);renderAll();});
    el.appendChild(btn);
  });
}

function renderHeader(){
  var d=LD[G.lang];
  document.getElementById('header').innerHTML=
    '<div style="font-size:0.65rem;letter-spacing:5px;color:#aaaaaa;margin-bottom:4px;">KING OF WANDS BRIDE — FINAL STAGE 6</div>'+
    '<div style="font-size:1.3rem;color:#ffffff;letter-spacing:1px;text-shadow:0 0 8px #ffffff44;">'+d.title+'</div>'+
    '<div style="font-size:0.6rem;color:#222222;margin-top:2px;">'+d.subtitle+'</div>';
}

function renderBride(){
  var el=document.getElementById('bride-panel');
  var state=getBrideState();var oe=Math.round(G.hunger);
  var barColor=G.hunger<40?'#aaaaaa':G.hunger<70?'#ff4444':'#ff0000';
  el.style.border='1px solid '+state.c+'44';
  el.innerHTML=
    '<div style="font-size:3.5rem;line-height:1;margin-bottom:8px;filter:drop-shadow(0 0 14px '+state.c+')">'+state.e+'</div>'+
    '<div style="font-size:0.85rem;color:'+state.c+';margin-bottom:6px;letter-spacing:1px;">'+state.s+'</div>'+
    '<div style="font-size:0.6rem;color:#ffffff22;margin-bottom:10px;letter-spacing:2px;">'+L('heightLabel')+'</div>'+
    '<div style="display:flex;justify-content:space-between;font-size:0.7rem;color:#333333;margin-bottom:4px;"><span>'+L('hunger')+'</span><span style="color:'+(G.hunger>70?'#ff0000':'#aaaaaa')+'">'+oe+'%</span></div>'+
    '<div style="height:8px;background:rgba(255,255,255,0.05);border-radius:4px;overflow:hidden;"><div style="height:100%;width:'+oe+'%;background:'+barColor+';border-radius:4px;transition:width 0.4s,background 0.4s;box-shadow:0 0 6px '+barColor+';"></div></div>'+
    '<div style="margin-top:8px;font-size:0.62rem;color:#222222;">대접 '+G.fedCount+'회 | 엔딩: 2000회</div>';
}

function renderStats(){
  var d=LD[G.lang];
  document.getElementById('stats').innerHTML=
    '<div style="display:flex;justify-content:space-around;">'+
    [{label:d.funds,val:'💰 '+G.money.toFixed(1)+d.unit,color:'#ffffff'},
     {label:d.income,val:'📈 '+G.income+d.perSec,color:'#aaaaaa'},
     {label:d.fed,val:'🍽 '+G.fedCount,color:'#ffd700'}]
    .map(function(s){return '<div style="text-align:center;"><div style="font-size:0.65rem;color:#222222;">'+s.label+'</div><div style="font-size:0.95rem;color:'+s.color+';">'+s.val+'</div></div>';})
    .join('')+'</div>';
}

function renderFoods(){
  var labelEl=document.getElementById('food-label');
  var gridEl=document.getElementById('food-grid');
  var d=LD[G.lang];
  labelEl.textContent=d.foodSec;gridEl.innerHTML='';
  getFoods().forEach(function(food){
    var canAfford=G.money>=food.cost;
    var btn=document.createElement('button');btn.className='food-btn';
    btn.style.cssText='background:'+(canAfford?'rgba(255,255,255,0.03)':'rgba(0,0,0,0.3)')+';border-color:'+(canAfford?'rgba(255,255,255,0.15)':'rgba(30,30,30,0.3)')+';color:'+(canAfford?'#e8dcc8':'#222222')+';opacity:'+(canAfford?'1':'0.45')+';cursor:'+(canAfford&&!G.gameOver?'pointer':'not-allowed')+';';
    if(G.gameOver)btn.disabled=true;
    btn.innerHTML='<div style="font-size:1.3rem;">'+food.emoji+'</div><div style="font-weight:bold;margin-top:2px;font-size:0.75rem;">'+food.name+'</div><div style="font-size:0.65rem;color:#ffffff22;">'+food.cost+d.unit+' | '+Math.abs(food.hunger)+'%↓</div>';
    btn.addEventListener('click',function(){feedFood(food);});
    gridEl.appendChild(btn);
  });
}

function renderUpgrades(){
  var labelEl=document.getElementById('upgrade-label');
  var listEl=document.getElementById('upgrade-list');
  var d=LD[G.lang];
  labelEl.textContent=d.upgSec;listEl.innerHTML='';
  UPGRADES.forEach(function(up){
    var owned=!!G.upgrades[up.id];var canBuy=!owned&&G.money>=up.cost&&!G.gameOver;
    var btn=document.createElement('button');btn.className='upgrade-btn';
    btn.style.cssText='background:'+(owned?'rgba(255,255,255,0.06)':canBuy?'rgba(255,255,255,0.02)':'rgba(0,0,0,0.3)')+';border-color:'+(owned?'rgba(255,255,255,0.3)':canBuy?'rgba(255,255,255,0.1)':'rgba(30,30,30,0.3)')+';color:'+(owned?'#ffffff':canBuy?'#e8dcc8':'#222222')+';cursor:'+(canBuy?'pointer':'not-allowed')+';width:100%;';
    if(!canBuy)btn.disabled=true;
    btn.innerHTML='<div style="text-align:left;"><div style="font-weight:bold;">'+(owned?'✓ ':'')+loc(up.name)+'</div><div style="font-size:0.65rem;color:'+(owned?'#aaaaaa':'#333333')+';">'+loc(up.desc)+'</div></div>'+(!owned?'<div style="font-size:0.75rem;color:#ffffff44;">'+up.cost+d.unit+'</div>':'');
    btn.addEventListener('click',function(){buyUpgrade(up);});
    listEl.appendChild(btn);
  });
}

function renderLog(){
  var d=LD[G.lang];
  document.getElementById('log-label').textContent=d.logSec;
  var entriesEl=document.getElementById('log-entries');
  entriesEl.innerHTML=G.logs.map(function(log,i){
    var isLast=i===G.logs.length-1;
    return '<div style="font-size:0.72rem;color:'+(isLast?'#ffffff':'#333333')+';margin-bottom:2px;">'+log+'</div>';
  }).join('');
  document.getElementById('log-box').scrollTop=9999;
}

function renderGameOver(){
  var el=document.getElementById('gameover');var d=LD[G.lang];
  if(G.gameOver){
    el.style.display='flex';
    document.getElementById('go-title').textContent=d.goTitle;
    document.getElementById('go-sub').textContent=d.goSub;
    document.getElementById('go-stats').textContent=d.goStats(G.totalEarned.toFixed(0),G.fedCount);
    document.getElementById('go-restart').textContent=d.restart;
    document.getElementById('go-continue').textContent=d.continueGame;
  }else{el.style.display='none';}
}

document.getElementById('go-restart').addEventListener('click',restartGame);
document.getElementById('go-continue').addEventListener('click',function(){
  Object.keys(G.autoTimers).forEach(function(k){clearInterval(G.autoTimers[k]);});
  G.autoTimers={};G.upgrades={};G.hunger=25;G.gameOver=false;
  G.logs=[LD[G.lang].restartLog[0]];
  lsSave();renderAll();
  setInterval(gameLoop,1000);setInterval(randomLog,9000);
});

playIntro(function(){
  G.hunger=25;
  G.logs=[L('s6enter'),LD[G.lang].quote];
  renderAll();
  setInterval(gameLoop,1000);
  setInterval(randomLog,9000);
});

})();
</script>
</body>
</html>
