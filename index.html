<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />

  <title>신부 밥줘 — Stage 1</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:linear-gradient(135deg,#0a0a0f 0%,#1a0a2e 50%,#0a0a0f 100%);min-height:100vh;font-family:Georgia,serif;color:#e8dcc8; }
    ::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:#3a2a4a;border-radius:2px}
    button{font-family:Georgia,serif;transition:filter 0.15s,transform 0.15s}
    button:hover:not(:disabled){filter:brightness(1.2);transform:translateY(-1px)}
    .scanline{position:fixed;inset:0;pointer-events:none;z-index:9998;opacity:0.025;background-image:repeating-linear-gradient(0deg,transparent,transparent 2px,#fff 2px,#fff 3px)}
    #intro{position:fixed;inset:0;z-index:9999;background:#000;display:flex;align-items:center;justify-content:center}
    #intro video{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
    #intro-logo{position:absolute;top:24px;left:50%;transform:translateX(-50%);font-size:0.6rem;letter-spacing:6px;color:rgba(200,180,220,0.7);z-index:1;white-space:nowrap}
    #intro-txt{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);font-size:0.75rem;letter-spacing:4px;color:rgba(200,180,220,0);z-index:1;white-space:nowrap;transition:color 2s ease}
    #intro-skip{display:none;position:absolute;bottom:28px;right:28px;background:rgba(0,0,0,0.6);color:#e8dcc8;border:1px solid rgba(200,180,220,0.35);border-radius:4px;padding:8px 20px;cursor:pointer;font-size:0.75rem;letter-spacing:2px}
    #event-overlay{display:none;position:fixed;inset:0;z-index:800;background:#000}
    #event-overlay video{width:100%;height:100%;object-fit:cover}
    #event-skip{position:absolute;bottom:28px;right:28px;background:rgba(0,0,0,0.6);color:#e8dcc8;border:1px solid rgba(200,180,220,0.35);border-radius:4px;padding:8px 20px;cursor:pointer;font-size:0.75rem;letter-spacing:2px}
    #log-img-panel{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0.75);align-items:center;justify-content:center;opacity:0;transition:opacity 0.5s ease}
    #gameover{display:none;position:fixed;inset:0;z-index:700;background:rgba(0,0,0,0.93);flex-direction:column;align-items:center;justify-content:center;gap:16px}
    .wrap{max-width:480px;margin:0 auto;padding:16px}
    .section-label{font-size:0.7rem;letter-spacing:2px;margin-bottom:8px}
    .food-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .food-btn{padding:10px 8px;border-radius:8px;text-align:left;border:1px solid;cursor:pointer}
    .upgrade-list{display:flex;flex-direction:column;gap:6px}
    .upgrade-btn{padding:10px 12px;border-radius:8px;border:1px solid;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
    #log-box{background:rgba(0,0,0,0.4);border:1px solid rgba(100,80,120,0.2);border-radius:8px;padding:10px 12px;max-height:150px;overflow-y:auto}
    #music-ctrl{position:fixed;bottom:16px;right:16px;z-index:600;display:flex;align-items:center;gap:8px;background:rgba(0,0,0,0.6);border:1px solid rgba(200,180,220,0.2);border-radius:20px;padding:6px 12px}
  </style>
</head>
<body>
<div class="scanline"></div>

<div id="intro">
  <video id="intro-vid" src="Intro.mp4" autoplay muted playsinline></video>
  <div id="intro-logo">KING OF WANDS BRIDE</div>
  <div id="intro-txt">새벽 4시. 그가 왔다.</div>
  <button id="intro-skip">SKIP ▶</button>
</div>

<div id="log-img-panel" onclick="this.style.display='none'">
  <img id="log-img-el" src="" style="max-width:90vw;max-height:90vh;width:480px;border-radius:12px;box-shadow:0 0 40px rgba(150,100,200,0.8);display:block;" />
</div>

<div id="event-overlay">
  <video id="event-vid" muted playsinline></video>
  <button id="event-skip">SKIP</button>
</div>

<div id="gameover">
  <div style="font-size:3rem">💥</div>
  <div id="go-title" style="font-size:1.4rem;color:#ff6060;font-weight:bold"></div>
  <div id="go-sub" style="color:#c0a0a0;font-size:0.9rem"></div>
  <div id="go-stats" style="color:#888;font-size:0.8rem"></div>
  <div style="display:flex;gap:12px;margin-top:8px;">
    <button id="go-continue" style="padding:10px 28px;background:#1a3a1a;color:#80c080;border:1px solid #3a8a3a;border-radius:4px;cursor:pointer;font-size:0.95rem;font-family:Georgia,serif;"></button>
    <button id="go-restart" style="padding:10px 28px;background:#3a1a4a;color:#e8dcc8;border:1px solid #6a3a8a;border-radius:4px;cursor:pointer;font-size:0.95rem;font-family:Georgia,serif;"></button>
  </div>
</div>

<!-- 음악 컨트롤 -->
<div id="music-ctrl">

</div>

<div class="wrap">

    <div id="upgrade-list" class="upgrade-list"></div>
  </div>
  <div id="log-box">

    <div id="log-entries"></div>

};
function lsGet(k,d){try{var v=localStorage.getItem(k);return v!==null?JSON.parse(v):d;}catch(e){return d;}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

// 저장된 스테이지로 바로 점프
(function(){
  var s=lsGet('ftb_stage',1);
  if(s>=4){window.location.href='stage4.html';return;}
  if(s>=3){window.location.href='stage3.html';return;}
  if(s>=2){window.location.href='stage2.html';return;}
})();
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function lsSave(){
  lsSet(LS.money,G.money);lsSet(LS.income,G.income);lsSet(LS.upgrades,G.upgrades);

setTimeout(function(){document.getElementById('intro-txt').style.color='rgba(200,180,220,0.7)';},2000);
setTimeout(function(){document.getElementById('intro-skip').style.display='block';},3000);
document.getElementById('intro-skip').addEventListener('click',endIntro);
introVid.addEventListener('ended',endIntro);
introVid.addEventListener('error',endIntro);

// ── BGM ──
var bgm=new Audio(BASE+'1.mp3');
bgm.loop=true;bgm.volume=0.35;
var bgmOn=true,bgmStarted=false;
function startBGM(){if(!bgmStarted){bgm.play().catch(function(){});bgmStarted=true;}}
document.addEventListener('click',startBGM,{once:true});
document.addEventListener('touchstart',startBGM,{once:true});
document.getElementById('bgm-toggle').addEventListener('click',function(){
  bgmOn=!bgmOn;
  bgm.muted=!bgmOn;
  this.textContent=bgmOn?'🔊':'🔇';
});
document.getElementById('bgm-vol').addEventListener('input',function(){
  bgm.volume=this.value/100;
  if(this.value==0){bgm.muted=true;bgmOn=false;document.getElementById('bgm-toggle').textContent='🔇';}
  else{bgm.muted=false;bgmOn=true;document.getElementById('bgm-toggle').textContent='🔊';}
});

document.getElementById('event-skip').addEventListener('click',closeEvent);
function showEvent(src){eventVid.src=BASE+src;eventOverlay.style.display='block';eventVid.play();eventVid.onended=closeEvent;}
function closeEvent(){eventOverlay.style.display='none';eventVid.src='';}

};
var _imgTimer=null;
function showLogImg(text){
  for(var k in LOG_IMG){
    if(text.indexOf(k)!==-1){
      var panel=document.getElementById('log-img-panel');
      document.getElementById('log-img-el').src=BASE+LOG_IMG[k];
      panel.style.display='flex';
      setTimeout(function(){panel.style.opacity='1';},50);
      if(_imgTimer)clearTimeout(_imgTimer);
      _imgTimer=setTimeout(function(){
        panel.style.opacity='0';
        setTimeout(function(){panel.style.display='none';},500);
      },4000);
      return;
    }
  }
}

function L(k){return LD[G.lang][k];}
function loc(o){return typeof o==='object'?(o[G.lang]||o.kr):o;}

function getBrideState(){
  var s=L('brideStates'),c=s[0];
  for(var i=0;i<s.length;i++){if(G.hunger>=s[i].t)c=s[i];}
  return c;
}

function addLog(t){
  G.logs.push(t);
  if(G.logs.length>50)G.logs.shift();
  showLogImg(t);
  renderLog();
}

// ── 음식 대접 ──
function feedFood(food){
  if(G.gameOver)return;
  var d=LD[G.lang];
  var name=loc(food.name);
  if(G.money<food.cost){addLog(d.noMoney(name,food.cost));return;}
  G.money=parseFloat((G.money-food.cost).toFixed(1));
  G.fedCount=parseFloat((G.fedCount+(food.fedW||1)).toFixed(1));
  G.hunger=parseFloat(Math.max(0,G.hunger+food.hunger).toFixed(1));
  addLog(d.feedLog(food.emoji,name,loc(food.quote)));

  // 이벤트 영상 호출
  if(food.eventVideo){
    if(!food.eventOnce){
      // 매번 호출 (스시, 한우)
      showEvent(food.eventVideo);
    } else if(!G.eventPlayed[food.id]){
      // 최초 1회만
      G.eventPlayed[food.id]=true;
      try{localStorage.setItem('ftb_eventPlayed',JSON.stringify(G.eventPlayed));}catch(e){}
      showEvent(food.eventVideo);
    }
  }

  // 한우 특수 로그
  if(food.special==='hanwoo'){
    setTimeout(function(){addLog(d.hanwooLog);},800);
    setTimeout(function(){addLog(d.hanwooLog2);},1600);
  }

  var fedInt=Math.floor(G.fedCount);

  // 세레나데 (20의 배수, 100 이하, 중복방지)
  if(fedInt>0&&fedInt%20===0&&fedInt<=100&&G.lastSerenadeAt!==fedInt){
    G.lastSerenadeAt=fedInt;
    if(!G.serenading){
      G.serenading=true;
      addLog(d.serLog1);addLog(d.serLog2);
      showEvent('videos/event_serenade.mp4');
      setTimeout(function(){G.serenading=false;},5000);
    }
  }

  lsSave();

  // 경찰 이벤트 (50회, 1회만)
  if(!G.policeUsed && Math.floor(G.fedCount)>=50){
    G.policeUsed=true;
    triggerPoliceEvent();
  }

  // 스테이지2 전환
  if(G.fedCount>=200){goToStage2();return;}

  renderBride();renderStats();renderFoods();renderUpgrades();
}

// ── 스테이지2 이동 ──
function goToStage2(){
  Object.keys(G.autoTimers).forEach(function(k){clearInterval(G.autoTimers[k]);});
  ['auto_lv1','auto_lv2','auto_lv3'].forEach(function(k){delete G.upgrades[k];});
  lsSet(LS.stage, 2);
  lsSave();
  addLog(L('s2transition'));
  document.body.style.transition='opacity 1s';
  document.body.style.opacity='0';
  setTimeout(function(){window.location.href='stage2.html';},1000);
}

// ── 업그레이드 ──
function buyUpgrade(up){
  if(G.gameOver||G.upgrades[up.id])return;
  var d=LD[G.lang];var name=loc(up.name);
  if(G.money<up.cost){addLog(d.noUpg(up.cost));return;}
  G.money=parseFloat((G.money-up.cost).toFixed(1));
  G.upgrades[up.id]=true;
  if(up.incomeBonus){
    G.income=parseFloat((G.income+up.incomeBonus).toFixed(1));
    addLog(d.buyUpg(name,up.incomeBonus));
  }
  if(up.autoFeed){
    var food=null;
    for(var i=0;i<FOODS.length;i++){if(FOODS[i].id===up.autoFeed){food=FOODS[i];break;}}
    if(food){
      (function(f){G.autoTimers[up.id]=setInterval(function(){feedFood(f);},up.autoInterval);})(food);
      addLog(d.autoStart(name,loc(food.name)));
    }
  }
  lsSave();renderStats();renderUpgrades();
}

// ── 게임루프 ──
function gameLoop(){
  if(G.gameOver)return;
  G.money=parseFloat((G.money+G.income).toFixed(1));
  G.totalEarned=parseFloat((G.totalEarned+G.income).toFixed(1));
  var rate=G.fedCount>=150?2.5:G.fedCount>=100?1.5:0.8;
  G.hunger=parseFloat(Math.min(100,G.hunger+rate).toFixed(1));
  if(G.hunger>=100){
    G.gameOver=true;
    showEvent('videos/event_gameover.mp4');
    renderGameOver();return;
  }
  lsSave();
  renderStats();renderBride();renderUpgrades();
}

function randomLog(){
  if(G.gameOver)return;
  var pool=L('randLogs');
  addLog(pool[Math.floor(Math.random()*pool.length)]);
}

// ── 리셋 ──
function restartGame(){
  Object.keys(G.autoTimers).forEach(function(k){clearInterval(G.autoTimers[k]);});
  G.money=10;G.income=2;G.fedCount=0;G.totalEarned=0;
  G.upgrades={};G.autoTimers={};G.eventPlayed={};
  G.hunger=50;G.gameOver=false;G.serenading=false;G.lastSerenadeAt=-1;
  G.logs=LD[G.lang].restartLog.slice();
  try{localStorage.setItem('ftb_eventPlayed','{}');}catch(e){}
  lsSave();renderAll();
}

    btn.style.cssText='background:'+(canAfford?'rgba(160,120,200,0.18)':'rgba(255,255,255,0.02)')+';border-color:'+(canAfford?'rgba(200,160,255,0.5)':'rgba(80,60,100,0.2)')+';color:'+(canAfford?'#e8dcc8':'#3a2a4a')+';opacity:'+(canAfford?'1':'0.45')+';cursor:'+(canAfford&&!G.gameOver?'pointer':'not-allowed')+';';
    if(G.gameOver)btn.disabled=true;
    btn.innerHTML='<div style="font-size:1.3rem;">'+food.emoji+'</div><div style="font-weight:bold;margin-top:2px;font-size:0.75rem;">'+name+'</div><div style="font-size:0.65rem;color:#8070a0;">'+food.cost+d.unit+' | '+Math.abs(food.hunger)+'%↓</div>';
    btn.addEventListener('click',function(){feedFood(food);});
    gridEl.appendChild(btn);
  });
}

function renderUpgrades(){
  var labelEl=document.getElementById('upgrade-label');
  var listEl=document.getElementById('upgrade-list');
  var d=LD[G.lang];
  labelEl.textContent=d.upgSec;labelEl.style.color='#6a5a7a';
  listEl.innerHTML='';
  UPGRADES.forEach(function(up){
    var owned=!!G.upgrades[up.id];var canBuy=!owned&&G.money>=up.cost&&!G.gameOver;
    var btn=document.createElement('button');btn.className='upgrade-btn';
    btn.style.cssText='background:'+(owned?'rgba(80,160,80,0.1)':canBuy?'rgba(255,255,255,0.05)':'rgba(255,255,255,0.02)')+';border-color:'+(owned?'rgba(80,160,80,0.4)':canBuy?'rgba(160,120,200,0.3)':'rgba(80,60,100,0.2)')+';color:'+(owned?'#80c080':canBuy?'#e8dcc8':'#4a3a5a')+';cursor:'+(canBuy?'pointer':'not-allowed')+';width:100%;';
    if(!canBuy)btn.disabled=true;
    btn.innerHTML='<div style="text-align:left;"><div style="font-weight:bold;">'+(owned?'✓ ':'')+loc(up.name)+'</div><div style="font-size:0.65rem;color:'+(owned?'#60a060':'#8070a0')+';">'+loc(up.desc)+'</div></div>'+(!owned?'<div style="font-size:0.75rem;color:#a080c0;">'+up.cost+d.unit+'</div>':'');
    btn.addEventListener('click',function(){buyUpgrade(up);});
    listEl.appendChild(btn);
  });
}

function renderLog(){
  var d=LD[G.lang];
  document.getElementById('log-label').textContent=d.logSec;
  var entriesEl=document.getElementById('log-entries');
  entriesEl.innerHTML=G.logs.map(function(log,i){
    var isLast=i===G.logs.length-1;
    return '<div style="font-size:0.72rem;color:'+(isLast?'#c8b8d8':'#6a5a7a')+';margin-bottom:2px;">'+log+'</div>';
  }).join('');
  document.getElementById('log-box').scrollTop=9999;
}

function renderGameOver(){
  var el=document.getElementById('gameover');var d=LD[G.lang];
  if(G.gameOver){
    el.style.display='flex';
    document.getElementById('go-title').textContent=d.goTitle;
    document.getElementById('go-sub').textContent=d.goSub;
    document.getElementById('go-stats').textContent=d.goStats(G.totalEarned.toFixed(0),G.fedCount);
    document.getElementById('go-continue').textContent=d.continueGame;
    document.getElementById('go-restart').textContent=d.restart;
  }else{el.style.display='none';}
}

// ── 초기화 ──
document.getElementById('go-restart').addEventListener('click',restartGame);
G.logs=lsGet(LS.fedCount,0)>0?LD[G.lang].restartLog.slice():LD[G.lang].initLog.slice();
renderAll();
setInterval(gameLoop,1000);
setInterval(randomLog,9000);

})();
</script>
</body>
</html>
