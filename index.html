function Game({ lang, onFirstFeed }) {
  const L = LANG[lang];
  const [money, setMoney] = useState(50);
  const [hunger, setHunger] = useState(10);
  const [incomeRate, setIncomeRate] = useState(2);
  const [ownedUpgrades, setOwnedUpgrades] = useState([]);
  const [log, setLog] = useState(L.initLog);
  const [gameOver, setGameOver] = useState(false);
  const [serenadeMode, setSerenadeMode] = useState(false);
  const [totalEarned, setTotalEarned] = useState(0);
  const [feedCount, setFeedCount] = useState(0);
  const autoFeedTimers = useRef({});
  const logRef = useRef(null);

  const getBrideState = (h) => {
    let state = L.brideStates[0];
    for (const s of L.brideStates) { if (h >= s.threshold) state = s; }
    return state;
  };

  const addLog = useCallback((msg) => {
    setLog((prev) => [...prev.slice(-30), msg]);
    setTimeout(() => { if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight; }, 50);
  }, []);

  useEffect(() => {
    if (gameOver) return;
    const t = setInterval(() => {
      setMoney((m) => +(m + incomeRate).toFixed(1));
      setTotalEarned((e) => +(e + incomeRate).toFixed(1));
    }, 1000);
    return () => clearInterval(t);
  }, [incomeRate, gameOver]);

  useEffect(() => {
    if (gameOver) return;
    const t = setInterval(() => {
      setHunger((h) => {
        const acceleration = 1 + ownedUpgrades.length * 0.15;
        const next = Math.min(100, h + 0.8 * acceleration);
        if (next >= 100) setGameOver(true);
        return next;
      });
    }, 1000);
    return () => clearInterval(t);
  }, [gameOver, ownedUpgrades]);

  useEffect(() => {
    if (gameOver) return;
    const t = setInterval(() => { addLog(L.logs[Math.floor(Math.random() * L.logs.length)]); }, 8000);
    return () => clearInterval(t);
  }, [gameOver, addLog, lang]);

  useEffect(() => {
    if (feedCount > 0 && feedCount % 20 === 0 && hunger < 30) {
      setSerenadeMode(true);
      addLog(L.serenadeLog1);
      addLog(L.serenadeLog2);
      setTimeout(() => setSerenadeMode(false), 5000);
    }
  }, [feedCount]);

  const feedBride = useCallback((food) => {
    if (gameOver) return;
    if (money < food.cost) { addLog(L.noMoney(food.name, food.cost)); return; }
    setMoney((m) => +(m - food.cost).toFixed(1));
    setHunger((h) => Math.max(0, h + food.hunger));
    if (feedCount === 0 && onFirstFeed) onFirstFeed();
    setFeedCount((c) => c + 1);
    addLog(L.feedLog(food.emoji, food.name, food.quote));
    if (food.id === "hanwoo") {
      setTimeout(() => addLog(L.hanwooLog), 800);
      setTimeout(() => addLog(L.hanwooLog2), 1600);
    }
  }, [gameOver, money, addLog, L]);

  const buyUpgrade = (upg) => {
    if (gameOver) return;
    if (money < upg.cost) { addLog(L.noUpgrade(upg.cost)); return; }
    if (ownedUpgrades.includes(upg.id)) return;
    setMoney((m) => +(m - upg.cost).toFixed(1));
    setOwnedUpgrades((p) => [...p, upg.id]);
    if (upg.incomeBonus) {
      setIncomeRate((r) => +(r + upg.incomeBonus).toFixed(1));
      addLog(L.buyUpgrade(upg.name, upg.incomeBonus));
    }
    if (upg.autoFeed) {
      const food = L.foods.find((f) => f.id === upg.autoFeed);
      const interval = upg.autoFeed === "misugaru" ? 30000 : 20000;
      autoFeedTimers.current[upg.id] = setInterval(() => { feedBride(food); }, interval);
      addLog(L.autoStart(upg.name, food.name));
    }
  };

  const restart = () => {
    setMoney(50); setHunger(10); setIncomeRate(2); setOwnedUpgrades([]);
    setGameOver(false); setSerenadeMode(false); setTotalEarned(0); setFeedCount(0);
    setLog(L.restartLog);
    Object.values(autoFeedTimers.current).forEach(clearInterval);
    autoFeedTimers.current = {};
  };

  const brideState = getBrideState(hunger);
  const hungerPct = Math.round(hunger);

  return (
    <div style={{ position: "relative" }}>
      {serenadeMode && (
        <div style={{ position: "fixed", inset: 0, zIndex: 100, background: "rgba(180,120,200,0.15)", display: "flex", alignItems: "center", justifyContent: "center", backdropFilter: "blur(2px)" }}>
          <div style={{ textAlign: "center", color: "#f0d0ff", padding: "32px" }}>
            <div style={{ fontSize: "3rem", marginBottom: "12px" }}>🎤</div>
            <div style={{ fontStyle: "italic", lineHeight: 1.8, fontSize: "1.1rem" }}>
              "I'm Not The Kind of Bride~<br />who says Yes~♪"
            </div>
            <div style={{ fontSize: "0.8rem", marginTop: "12px", color: "#c0a0e0" }}>{L.serenadeSafe}</div>
          </div>
        </div>
      )}

      {gameOver && (
        <div style={{ position: "fixed", inset: 0, zIndex: 200, background: "rgba(0,0,0,0.93)", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: "16px" }}>
          <div style={{ fontSize: "3rem" }}>💥</div>
          <div style={{ fontSize: "1.4rem", color: "#ff6060", fontWeight: "bold" }}>{L.gameOverTitle}</div>
          <div style={{ color: "#c0a0a0", fontSize: "0.9rem" }}>{L.gameOverSub}</div>
          <div style={{ color: "#888", fontSize: "0.8rem" }}>{L.gameOverStats(totalEarned.toFixed(0), feedCount)}</div>
          <button onClick={restart} style={{ marginTop: "8px", padding: "10px 28px", background: "#3a1a4a", color: "#e8dcc8", border: "1px solid #6a3a8a", borderRadius: "4px", cursor: "pointer", fontSize: "0.95rem" }}>
            {L.restart}
          </button>
        </div>
      )}

      <div style={{ background: "rgba(255,255,255,0.04)", border: `1px solid ${brideState.color}44`, borderRadius: "12px", padding: "16px", marginBottom: "14px", textAlign: "center" }}>
        <div style={{ fontSize: "3.5rem", lineHeight: 1, marginBottom: "8px", filter: hunger > 80 ? "drop-shadow(0 0 14px #ff3030)" : "none" }}>{brideState.emoji}</div>
        <div style={{ fontSize: "0.85rem", color: brideState.color, marginBottom: "10px", letterSpacing: "1px" }}>{brideState.status}</div>
        <div style={{ marginBottom: "6px" }}>
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: "0.7rem", color: "#8070a0", marginBottom: "4px" }}>
            <span>{L.hunger}</span>
            <span style={{ color: hunger > 70 ? "#ff7060" : "#8070a0" }}>{hungerPct}%</span>
          </div>
          <div style={{ height: "8px", background: "rgba(255,255,255,0.08)", borderRadius: "4px", overflow: "hidden" }}>
            <div style={{ height: "100%", width: `${hungerPct}%`, background: hunger < 40 ? "#60c080" : hunger < 70 ? "#d0a030" : "#e04040", borderRadius: "4px", transition: "width 0.5s ease, background 0.5s ease" }} />
          </div>
        </div>
        <div style={{ display: "flex", justifyContent: "space-around", marginTop: "10px" }}>
          {[
            { label: L.funds, value: `💰 ${money.toFixed(1)}${L.unit}`, color: "#c0e080" },
            { label: L.income, value: `📈 ${incomeRate}${L.perSec}`, color: "#80c0e0" },
            { label: L.fed, value: `🍽 ${feedCount}`, color: "#e0a0c0" },
          ].map(({ label, value, color }) => (
            <div key={label}>
              <div style={{ fontSize: "0.65rem", color: "#6a5a7a" }}>{label}</div>
              <div style={{ fontSize: "1rem", color }}>{value}</div>
            </div>
          ))}
        </div>
      </div>

      <div style={{ marginBottom: "14px" }}>
        <div style={{ fontSize: "0.7rem", color: "#6a5a7a", letterSpacing: "2px", marginBottom: "8px" }}>{L.foodSection}</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "8px" }}>
          {L.foods.map((food) => (
            <button key={food.id} onClick={() => feedBride(food)} disabled={money < food.cost || gameOver}
              style={{ padding: "10px 8px", background: money >= food.cost ? "rgba(255,255,255,0.06)" : "rgba(255,255,255,0.02)", border: "1px solid", borderColor: money >= food.cost ? "rgba(200,180,220,0.3)" : "rgba(100,80,120,0.2)", borderRadius: "8px", color: money >= food.cost ? "#e8dcc8" : "#5a4a6a", cursor: money >= food.cost ? "pointer" : "not-allowed", fontSize: "0.8rem", textAlign: "left" }}>
              <div style={{ fontSize: "1.3rem" }}>{food.emoji}</div>
              <div style={{ fontWeight: "bold", marginTop: "2px" }}>{food.name}</div>
              <div style={{ fontSize: "0.65rem", color: "#8070a0" }}>{food.cost}{L.unit} | -{Math.abs(food.hunger)}%</div>
            </button>
          ))}
        </div>
      </div>

      <div style={{ marginBottom: "14px" }}>
        <div style={{ fontSize: "0.7rem", color: "#6a5a7a", letterSpacing: "2px", marginBottom: "8px" }}>{L.upgradeSection}</div>
        <div style={{ display: "flex", flexDirection: "column", gap: "6px" }}>
          {L.upgrades.map((upg) => {
            const owned = ownedUpgrades.includes(upg.id);
            const canBuy = money >= upg.cost && !owned;
            return (
              <button key={upg.id} onClick={() => buyUpgrade(upg)} disabled={!canBuy || gameOver}
                style={{ padding: "10px 12px", background: owned ? "rgba(80,160,80,0.1)" : canBuy ? "rgba(255,255,255,0.05)" : "rgba(255,255,255,0.02)", border: "1px solid", borderColor: owned ? "rgba(80,160,80,0.4)" : canBuy ? "rgba(160,120,200,0.3)" : "rgba(80,60,100,0.2)", borderRadius: "8px", color: owned ? "#80c080" : canBuy ? "#e8dcc8" : "#4a3a5a", cursor: canBuy ? "pointer" : "not-allowed", fontSize: "0.8rem", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div style={{ textAlign: "left" }}>
                  <div style={{ fontWeight: "bold" }}>{owned ? "✓ " : ""}{upg.name}</div>
                  <div style={{ fontSize: "0.65rem", color: owned ? "#60a060" : "#8070a0" }}>{upg.desc}</div>
                </div>
                {!owned && <div style={{ fontSize: "0.75rem", color: "#a080c0" }}>{upg.cost}{L.unit}</div>}
              </button>
            );
          })}
        </div>
      </div>

      <div style={{ background: "rgba(0,0,0,0.4)", border: "1px solid rgba(100,80,120,0.2)", borderRadius: "8px", padding: "10px 12px", maxHeight: "120px", overflowY: "auto" }} ref={logRef}>
        <div style={{ fontSize: "0.65rem", color: "#6a5a7a", letterSpacing: "2px", marginBottom: "6px" }}>{L.logSection}</div>
        {log.map((msg, i) => (
          <div key={i} style={{ fontSize: "0.72rem", color: i === log.length - 1 ? "#c8b8d8" : "#6a5a7a", marginBottom: "2px" }}>{msg}</div>
        ))}
      </div>
    </div>
  );
}

function App() {
  const [lang, setLang] = useState("en");
  const audioRef = useRef(null);

  // 🎵 오디오: 같은 깃허브 저장소 안에 audio/노래파일.mp3 로 올리면 여기 경로만 바꿔서 연결하면 됨
  const playMusic = useCallback(() => {
    if (audioRef.current) {
      audioRef.current.volume = 0.5;
      audioRef.current.play().catch(() => {});
    }
  }, []);

  return (
    <div style={{ minHeight: "100vh", background: "linear-gradient(135deg, #0a0a0f 0%, #1a0a2e 50%, #0a0a0f 100%)", fontFamily: "'Georgia', serif", color: "#e8dcc8", padding: "16px", position: "relative", overflow: "hidden" }}>
      <audio ref={audioRef} src="audio/王のワント_の花嫁__Japanese_Version_.wav" preload="none" />
      <div style={{ position: "fixed", inset: 0, opacity: 0.03, backgroundImage: "repeating-linear-gradient(0deg, transparent, transparent 2px, #fff 2px, #fff 3px)", pointerEvents: "none" }} />
      <div style={{ maxWidth: "480px", margin: "0 auto" }}>
        <div style={{ textAlign: "center", marginBottom: "16px" }}>
          <div style={{ fontSize: "0.65rem", letterSpacing: "5px", color: "#6040a0", marginBottom: "4px" }}>KING OF WANDS BRIDE</div>
          <div style={{ fontSize: "1.3rem", color: "#e8dcc8", letterSpacing: "1px" }}>{LANG[lang].title}</div>
          <div style={{ fontSize: "0.6rem", color: "#5a4a6a", marginTop: "2px" }}>{LANG[lang].subtitle}</div>
        </div>
        <div style={{ display: "flex", gap: "6px", marginBottom: "16px", background: "rgba(0,0,0,0.3)", borderRadius: "8px", padding: "4px" }}>
          {["en", "kr", "jp"].map((l) => (
            <button key={l} onClick={() => setLang(l)} style={{ flex: 1, padding: "8px", background: lang === l ? "rgba(120,80,160,0.4)" : "transparent", border: lang === l ? "1px solid rgba(160,100,200,0.5)" : "1px solid transparent", borderRadius: "6px", color: lang === l ? "#e8dcc8" : "#6a5a7a", cursor: "pointer", fontSize: "0.8rem", fontFamily: "inherit" }}>
              {LANG[l].tab}
            </button>
          ))}
        </div>
        <Game lang={lang} onFirstFeed={playMusic} />
        <div style={{ textAlign: "center", marginTop: "14px", fontSize: "0.55rem", color: "#2a1a3a", letterSpacing: "2px" }}>MAID¥$AMA × TAKAKO WORLD</div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
