  var G = {

  // ── 헬퍼 ──
  function L(key) { return LD[G.lang][key]; }
  function loc(obj) { return typeof obj === 'object' ? (obj[G.lang] || obj.kr) : obj; }

  function getFoods() {
    return G.stage === 2 ? FOODS_S2[G.lang] : FOODS_S1;
  }

  function getBrideState() {
    var states = L('brideStates');
    var cur = states[0];
    for (var i = 0; i < states.length; i++) {
      if (G.hunger >= states[i].t) cur = states[i];
    }
    return cur;
  }

  function addLog(text) {
    G.logs.push(text);
    if (G.logs.length > 50) G.logs.shift();
    renderLog();
  }

  // ── 음식 대접 ──
  function feedFood(food) {
    if (G.gameOver || G.inTransition) return;
    var d = LD[G.lang];
    var name = loc(food.name);
    if (G.money < food.cost) {
      addLog(d.noMoney(name, food.cost));
      return;
    }
    G.money = parseFloat((G.money - food.cost).toFixed(1));
    G.fedCount = parseFloat((G.fedCount + (food.fedW || 1)).toFixed(1));
    G.hunger = parseFloat(Math.max(0, G.hunger + food.hunger).toFixed(1));
    var quote = loc(food.quote);
    addLog(d.feedLog(food.emoji, name, quote));

    // 특수
    if (food.special === 'hanwoo') {
      setTimeout(function(){ addLog(d.hanwooLog); }, 800);
      setTimeout(function(){ addLog(d.hanwooLog2); }, 1600);
      if (G.fedCount <= 100) showEvent('videos/event_hanwoo.mp4');
    }
    if (food.special === 'sake') {
      addLog('🍶 그가 단숨에 들이켰다.');
    }

    var fedInt = Math.floor(G.fedCount);

    // 세레나데 (20의 배수, 100 이하, 중복방지)
    if (G.stage === 1 && fedInt > 0 && fedInt % 20 === 0 && fedInt <= 100 && G.lastSerenadeAt !== fedInt) {
      G.lastSerenadeAt = fedInt;
      if (!G.serenading) {
        G.serenading = true;
        addLog(d.serLog1);
        addLog(d.serLog2);
        showEvent('videos/event_serenade.mp4');
        setTimeout(function(){ G.serenading = false; }, 5000);
      }
    }

    // 스테이지2 전환
    if (G.stage === 1 && G.fedCount >= 200 && !G.s2unlocked) {
      triggerStage2();
    }

    // 스테이지2 미스터리
    if (G.stage === 2) {
      var mystery = d.s2mystery;
      if (mystery[fedInt] && G.lastMysteryAt !== fedInt) {
        G.lastMysteryAt = fedInt;
        addLog('신부: ' + mystery[fedInt]);
      }
    }

    renderBride();
    renderStats();
    renderFoods();
    renderUpgrades();
  }

  // ── 업그레이드 ──
  function buyUpgrade(up) {
    if (G.gameOver || G.upgrades[up.id]) return;
    var d = LD[G.lang];
    var name = loc(up.name);
    if (G.money < up.cost) {
      addLog(d.noUpg(up.cost));
      return;
    }
    G.money = parseFloat((G.money - up.cost).toFixed(1));
    G.upgrades[up.id] = true;

    if (up.incomeBonus) {
      G.income = parseFloat((G.income + up.incomeBonus).toFixed(1));
      addLog(d.buyUpg(name, up.incomeBonus));
    }
    if (up.autoFeed) {
      var targetFood = null;
      for (var i = 0; i < FOODS_S1.length; i++) {
        if (FOODS_S1[i].id === up.autoFeed) { targetFood = FOODS_S1[i]; break; }
      }
      if (targetFood) {
        (function(f) {
          G.autoTimers[up.id] = setInterval(function(){ feedFood(f); }, up.autoInterval);
        })(targetFood);
        addLog(d.autoStart(name, loc(targetFood.name)));
      }
    }
    renderStats();
    renderUpgrades();
  }

  // ── 스테이지2 전환 ──
  function triggerStage2() {
    if (G.s2unlocked || G.inTransition) return;
    G.s2unlocked = true;
    G.inTransition = true;

    var s2el = document.getElementById('s2-overlay');
    var narEl = document.getElementById('s2-narration');
    var d = LD[G.lang];

    s2el.style.display = 'flex';
    s2el.style.background = '#000';
    narEl.style.color = '#e8dcc8';

    // 화면 진동
    document.body.style.animation = 'shake 0.6s ease';
    setTimeout(function(){ document.body.style.animation = ''; }, 600);

    // 나레이션
    var lines = d.s2narr.split('\n');
    narEl.innerHTML = lines.map(function(l){ return '<div>'+l+'</div>'; }).join('');
    setTimeout(function(){ narEl.style.opacity = '1'; }, 300);

    // 네온그린
    setTimeout(function(){
      s2el.style.background = 'rgba(0,20,0,0.97)';
      narEl.style.color = '#39ff14';
    }, 1800);

    // 타카시 대사
    setTimeout(function(){
      narEl.innerHTML += '<div style="margin-top:20px;color:#39ff14;font-size:1.1rem;font-style:normal;font-weight:bold;">'+d.s2quote+'</div>';
    }, 3000);

    // 스테이지2 진입
    setTimeout(function(){
      s2el.style.transition = 'opacity 1s';
      s2el.style.opacity = '0';
      setTimeout(function(){
        s2el.style.display = 'none';
        s2el.style.opacity = '1';
        s2el.style.transition = '';
        G.stage = 2;
        G.hunger = parseFloat(Math.max(0, G.hunger - 10).toFixed(1));
        G.inTransition = false;
        addLog(d.s2enter);
        renderAll();
      }, 1000);
    }, 5000);
  }

  // ── 게임루프 ──
  function gameLoop() {
    if (G.gameOver || G.inTransition) return;

    // 수입
    G.money = parseFloat((G.money + G.income).toFixed(1));
    G.totalEarned = parseFloat((G.totalEarned + G.income).toFixed(1));

    // 배고픔 증가율 (대접 횟수 구간별)
    var rate;
    if (G.stage === 2) {
      rate = 1.2;
    } else if (G.fedCount >= 150) {
      rate = 2.5;
    } else if (G.fedCount >= 100) {
      rate = 1.5;
    } else {
      rate = 0.8;
    }
    G.hunger = parseFloat(Math.min(100, G.hunger + rate).toFixed(1));

    if (G.hunger >= 100) {
      G.gameOver = true;
      showEvent('videos/event_gameover.mp4');
      renderGameOver();
      return;
    }

    renderStats();
    renderBride();
    renderUpgrades();
  }

  // 랜덤 로그
  function randomLog() {
    if (G.gameOver || G.inTransition) return;
    var d = LD[G.lang];
    var pool;
    if (G.stage === 2) {
      if      (G.hunger < 40) pool = d.s2logs.early;
      else if (G.hunger < 65) pool = d.s2logs.mid;
      else if (G.hunger < 80) pool = d.s2logs.danger;
      else                    pool = d.s2logs.critical;
    } else {
      pool = d.randLogs;
    }
    addLog(pool[Math.floor(Math.random() * pool.length)]);
  }

  // ── 리셋 ──
  function restartGame() {
    Object.keys(G.autoTimers).forEach(function(k){ clearInterval(G.autoTimers[k]); });
    G.money = 10;
    G.hunger = 50;
    G.income = 2;
    G.fedCount = 0;
    G.totalEarned = 0;
    G.upgrades = {};
    G.autoTimers = {};
    G.gameOver = false;
    G.serenading = false;
    G.inTransition = false;
    G.s2unlocked = false;
    G.lastSerenadeAt = -1;
    G.lastMysteryAt = -1;
    G.stage = 1;
    G.logs = LD[G.lang].restartLog.slice();
    renderAll();
  }

      '<div style="display:flex;justify-content:space-around;margin-bottom:4px;">'+
      [
        {label:d.funds,  val:'💰 '+G.money.toFixed(1)+d.unit, color:'#c0e080'},
        {label:d.income, val:'📈 '+G.income+d.perSec,          color:'#80c0e0'},
        {label:d.fed,    val:'🍽 '+G.fedCount,                  color:'#e0a0c0'},
      ].map(function(s){
        return '<div style="text-align:center;">'+
          '<div style="font-size:0.65rem;color:#6a5a7a;">'+s.label+'</div>'+
          '<div style="font-size:0.95rem;color:'+s.color+';'+ns+'">'+s.val+'</div>'+
        '</div>';
      }).join('')+
      '</div>';
  }

  function renderFoods() {
    var labelEl = document.getElementById('food-label');
    var gridEl  = document.getElementById('food-grid');
    var d = LD[G.lang];
    var isS2 = G.stage === 2;
    labelEl.style.color = isS2 ? '#39ff14' : '#6a5a7a';
    labelEl.textContent = d.foodSec;
    gridEl.innerHTML = '';

    var foods = getFoods();
    foods.forEach(function(food) {
      var name = loc(food.name);
      var canAfford = G.money >= food.cost;
      var btn = document.createElement('button');
      btn.className = 'food-btn';
      btn.style.cssText = [
        'background:'+(canAfford?'rgba(255,255,255,0.06)':'rgba(255,255,255,0.02)'),
        'border-color:'+(canAfford?(isS2?'rgba(57,255,20,0.3)':'rgba(200,180,220,0.3)'):'rgba(100,80,120,0.2)'),
        'color:'+(canAfford?'#e8dcc8':'#5a4a6a'),
        'cursor:'+(canAfford&&!G.gameOver&&!G.inTransition?'pointer':'not-allowed'),
      ].join(';');
      if (G.gameOver || G.inTransition) btn.disabled = true;
      btn.innerHTML =
        '<div style="font-size:1.3rem;">'+food.emoji+'</div>'+
        '<div style="font-weight:bold;margin-top:2px;font-size:0.75rem;">'+name+'</div>'+
        '<div style="font-size:0.65rem;color:'+(isS2?'#39ff1488':'#8070a0')+';">'+food.cost+d.unit+' | '+Math.abs(food.hunger)+'%↓</div>';
      btn.addEventListener('click', function(){ feedFood(food); });
      gridEl.appendChild(btn);
    });
  }

  function renderUpgrades() {
    var labelEl = document.getElementById('upgrade-label');
    var listEl  = document.getElementById('upgrade-list');
    var d = LD[G.lang];
    var isS2 = G.stage === 2;
    labelEl.style.color = isS2 ? '#39ff14' : '#6a5a7a';
    labelEl.textContent = d.upgSec;
    listEl.innerHTML = '';

    UPGRADES.forEach(function(up) {
      var owned = !!G.upgrades[up.id];
      var canBuy = !owned && G.money >= up.cost && !G.gameOver && !G.inTransition;
      var name = loc(up.name);
      var desc = loc(up.desc);
      var btn = document.createElement('button');
      btn.className = 'upgrade-btn';
      btn.style.cssText = [
        'background:'+(owned?'rgba(80,160,80,0.1)':canBuy?'rgba(255,255,255,0.05)':'rgba(255,255,255,0.02)'),
        'border-color:'+(owned?'rgba(80,160,80,0.4)':canBuy?'rgba(160,120,200,0.3)':'rgba(80,60,100,0.2)'),
        'color:'+(owned?'#80c080':canBuy?'#e8dcc8':'#4a3a5a'),
        'cursor:'+(canBuy?'pointer':'not-allowed'),
        'width:100%',
      ].join(';');
      if (!canBuy) btn.disabled = true;
      btn.innerHTML =
        '<div style="text-align:left;">'+
          '<div style="font-weight:bold;">'+(owned?'✓ ':'')+name+'</div>'+
          '<div style="font-size:0.65rem;color:'+(owned?'#60a060':'#8070a0')+';">'+desc+'</div>'+
        '</div>'+
        (!owned?'<div style="font-size:0.75rem;color:#a080c0;">'+up.cost+d.unit+'</div>':'');
      btn.addEventListener('click', function(){ buyUpgrade(up); });
      listEl.appendChild(btn);
    });
  }

  function renderLog() {
    var labelEl  = document.getElementById('log-label');
    var entriesEl = document.getElementById('log-entries');
    var logBox   = document.getElementById('log-box');
    var d = LD[G.lang];
    var isS2 = G.stage === 2;
    labelEl.style.color = isS2 ? '#39ff14' : '#6a5a7a';
    labelEl.textContent = d.logSec;
    logBox.style.borderColor = isS2 ? 'rgba(57,255,20,0.2)' : 'rgba(100,80,120,0.2)';

    entriesEl.innerHTML = G.logs.map(function(log, i) {
      var isLast = i === G.logs.length - 1;
      var col = isLast ? (isS2?'#39ff14':'#c8b8d8') : (isS2?'#39ff1055':'#6a5a7a');
      return '<div style="font-size:0.72rem;color:'+col+';margin-bottom:2px;">'+log+'</div>';
    }).join('');
    logBox.scrollTop = logBox.scrollHeight;
  }

  function renderGameOver() {
    var el = document.getElementById('gameover');
    var d = LD[G.lang];
    if (G.gameOver) {
      el.style.display = 'flex';
      document.getElementById('go-title').textContent = d.goTitle;
      document.getElementById('go-sub').textContent = d.goSub;
      document.getElementById('go-stats').textContent = d.goStats(G.totalEarned.toFixed(0), G.fedCount);
      document.getElementById('go-restart').textContent = d.restart;
    } else {
      el.style.display = 'none';
    }
  }

  // ── 초기화 ──
  document.getElementById('go-restart').addEventListener('click', restartGame);

  G.logs = LD[G.lang].initLog.slice();
  renderAll();

  setInterval(gameLoop, 1000);
  setInterval(randomLog, 9000);

})();
</script>
</body>
</html>
