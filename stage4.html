    .food-btn{padding:10px 8px;border-radius:8px;text-align:left;border:1px solid;cursor:pointer}
    .upgrade-list{display:flex;flex-direction:column;gap:6px}
    .upgrade-btn{padding:10px 12px;border-radius:8px;border:1px solid;cursor:pointer;display:flex;justify-content:space-between;align-items:center}

document.addEventListener('click',startBGM,{once:true});
document.addEventListener('touchstart',startBGM,{once:true});
document.getElementById('bgm-toggle').addEventListener('click',function(){
  bgmOn=!bgmOn;bgm.muted=!bgmOn;this.textContent=bgmOn?'🔊':'🔇';
});
document.getElementById('bgm-vol').addEventListener('input',function(){
  bgm.volume=this.value/100;

var eventVid=document.getElementById('event-vid');
document.getElementById('event-skip').addEventListener('click',closeEvent);
function showEvent(src){
  var done=false;
  function finish(){if(done)return;done=true;closeEvent();}
  eventVid.onended=finish;eventVid.onerror=finish;
  eventVid.src=BASE+src;eventOverlay.style.display='block';
  eventVid.play().catch(function(){finish();});
  setTimeout(function(){finish();},30000);
}
function closeEvent(){eventOverlay.style.display='none';eventVid.src='';}

    {id:'enzyme',   name:'酵素促進ドリンク',          cost:350, hunger:-18,emoji:'🧪',quote:'…味はない。',           fedW:1},
    {id:'cell',     name:'細胞栄養剤ドラム缶',        cost:650, hunger:-32,emoji:'🔴',quote:'…何かが反応する。',    fedW:1},
    {id:'quantum',  name:'量子エネルギー食品',        cost:1000,hunger:-50,emoji:'⚛️',quote:'…これは違う。',        fedW:2,special:'quantum'},
  ],
};

// ── 업그레이드 (스테이지4) ──
var UPGRADES=[
  {id:'grant',   name:{kr:'연구비 수주',          en:'Research Grant',     jp:'研究費受注'},         cost:2000, incomeBonus:50,  desc:{kr:'+50원/초',  en:'+50 won/sec', jp:'+50円/秒'}},
  {id:'plagiar', name:{kr:'논문 표절 판매',        en:'Plagiarized Papers',  jp:'論文盗用販売'},       cost:5000, incomeBonus:120, desc:{kr:'+120원/초', en:'+120 won/sec',jp:'+120円/秒'}},
  {id:'patent',  name:{kr:'타카시 관련 특허 출원',en:'Takashi Patents',     jp:'タカシ関連特許出願'}, cost:10000,incomeBonus:300, desc:{kr:'+300원/초', en:'+300 won/sec',jp:'+300円/秒'}},
  {id:'lab_s4_1',name:{kr:'연구소 급식 시스템 Lv1',en:'Lab Feeder Lv1',    jp:'研究所給食Lv1'},      cost:3000, autoFeed:'culture', autoInterval:20000,desc:{kr:'20초마다 배양육',en:'Culture/20s',jp:'20秒ごと培養肉'}},
  {id:'lab_s4_2',name:{kr:'연구소 급식 시스템 Lv2',en:'Lab Feeder Lv2',    jp:'研究所給食Lv2'},      cost:7000, autoFeed:'dna',     autoInterval:15000,desc:{kr:'15초마다 DNA영양액',en:'DNA/15s',jp:'15秒ごとDNA'}},
  {id:'lab_s4_3',name:{kr:'연구소 급식 시스템 Lv3',en:'Lab Feeder Lv3',    jp:'研究所給食Lv3'},      cost:15000,autoFeed:'quantum',  autoInterval:10000,desc:{kr:'10초마다 양자 에너지',en:'Quantum/10s',jp:'10秒ごと量子'}},
];

// ── 게임 상태 ──
var G={
  lang:       lsGet(LS.lang,'kr'),
  money:      lsGet(LS.money,10),
  income:     lsGet(LS.income,2),
  upgrades:   lsGet(LS.upgrades,{}),
  fedCount:   lsGet(LS.fedCount,0),
  totalEarned:lsGet(LS.totalEarned,0),
  hunger:50,gameOver:false,lastMysteryAt:-1,
  logs:[],autoTimers:{},
};

function L(k){return LD[G.lang][k];}
function loc(o){return typeof o==='object'?(o[G.lang]||o.kr):o;}
function getFoods(){return FOODS[G.lang]||FOODS.kr;}

function getBrideState(){
  var s=L('brideStates'),c=s[0];
  for(var i=0;i<s.length;i++){if(G.hunger>=s[i].t)c=s[i];}
  return c;
}

function addLog(t){
  G.logs.push(t);if(G.logs.length>50)G.logs.shift();renderLog();
}

// ── 음식 대접 ──
function feedFood(food){
  if(G.gameOver)return;
  var d=LD[G.lang];
  if(G.money<food.cost){addLog(d.noMoney(food.name,food.cost));return;}
  G.money=parseFloat((G.money-food.cost).toFixed(1));
  G.fedCount=parseFloat((G.fedCount+(food.fedW||1)).toFixed(1));
  G.hunger=parseFloat(Math.max(0,G.hunger+food.hunger).toFixed(1));
  addLog(d.feedLog(food.emoji,food.name,food.quote));

  if(food.special==='gmofood'){
    setTimeout(function(){addLog('🧬 유전자 편집 한우... 타카시가 조용해졌다.');},800);
  }
  if(food.special==='quantum'){
    setTimeout(function(){addLog('⚛️ 그의 눈이 잠깐 빛났다. ...원인 불명.');},800);
  }

  var fedInt=Math.floor(G.fedCount);
  var mystery=L('mystery');
  if(mystery[fedInt]&&G.lastMysteryAt!==fedInt){
    G.lastMysteryAt=fedInt;addLog('신부: '+mystery[fedInt]);
  }

  if(G.fedCount>=1100){goToStage5();return;}
  lsSave();renderBride();renderStats();renderFoods();renderUpgrades();
}

function goToStage5(){
  lsSave();addLog(L('s5transition'));
  document.body.style.transition='opacity 1s';document.body.style.opacity='0';
  setTimeout(function(){window.location.href='stage5.html';},1000);
}

// ── 업그레이드 ──
function buyUpgrade(up){
  if(G.gameOver||G.upgrades[up.id])return;
  var d=LD[G.lang];var name=loc(up.name);
  if(G.money<up.cost){addLog(d.noUpg(up.cost));return;}
  G.money=parseFloat((G.money-up.cost).toFixed(1));
  G.upgrades[up.id]=true;
  if(up.incomeBonus){
    G.income=parseFloat((G.income+up.incomeBonus).toFixed(1));
    addLog(d.buyUpg(name,up.incomeBonus));
  }
  if(up.autoFeed){
    var foods=getFoods();var food=null;
    for(var i=0;i<foods.length;i++){if(foods[i].id===up.autoFeed){food=foods[i];break;}}
    if(food){
      (function(f){G.autoTimers[up.id]=setInterval(function(){feedFood(f);},up.autoInterval);})(food);
      addLog(d.autoStart(name,food.name));
    }
  }
  lsSave();renderStats();renderUpgrades();
}

// ── 게임루프 ──
function gameLoop(){
  if(G.gameOver)return;
  G.money=parseFloat((G.money+G.income).toFixed(1));
  G.totalEarned=parseFloat((G.totalEarned+G.income).toFixed(1));
  var rate=G.fedCount>=550?4.0:G.fedCount>=500?3.2:G.fedCount>=450?2.5:2.0;
  G.hunger=parseFloat(Math.min(100,G.hunger+rate).toFixed(1));
  if(G.hunger>=100){
    G.gameOver=true;showEvent('videos/event_gameover.mp4');renderGameOver();return;
  }
  lsSave();renderStats();renderBride();renderUpgrades();
}

function randomLog(){
  if(G.gameOver)return;
  var logs=L('randLogs');
  var pool=G.hunger<40?logs.early:G.hunger<65?logs.mid:G.hunger<80?logs.danger:logs.critical;
  addLog(pool[Math.floor(Math.random()*pool.length)]);
}

function restartGame(){
  Object.keys(G.autoTimers).forEach(function(k){clearInterval(G.autoTimers[k]);});
  G.money=10;G.income=2;G.fedCount=0;G.totalEarned=0;
  G.upgrades={};G.autoTimers={};G.hunger=50;G.gameOver=false;
  lsSave();window.location.href='index.html';
}

// ── 진입 연출 ──
function playIntro(cb){
  var introEl=document.getElementById('s4-intro');
  var narEl=document.getElementById('s4-narration');
  var d=LD[G.lang];
  introEl.style.display='flex';introEl.style.background='#000';
  narEl.style.opacity='0';narEl.style.color='#e8dcc8';
  var lines=d.narration.split('\n');
  narEl.innerHTML=lines.map(function(l){return '<div>'+l+'</div>';}).join('');
  document.body.style.animation='shake 0.6s ease';
  setTimeout(function(){document.body.style.animation='';},600);
  setTimeout(function(){narEl.style.opacity='1';},300);
  setTimeout(function(){introEl.style.background='rgba(20,8,0,0.97)';narEl.style.color='#ff8c00';},1800);
  setTimeout(function(){narEl.innerHTML+='<div style="margin-top:20px;color:#ff8c00;font-size:1.1rem;font-style:normal;font-weight:bold;">'+d.quote+'</div>';},3000);
  setTimeout(function(){
    introEl.style.transition='opacity 1s';introEl.style.opacity='0';
    setTimeout(function(){
      introEl.style.display='none';introEl.style.opacity='1';introEl.style.transition='';
      cb();
    },1000);
  },5000);
}

// ── 렌더링 ──
function renderAll(){renderLangTabs();renderHeader();renderBride();renderStats();renderFoods();renderUpgrades();renderLog();renderGameOver();}

function renderLangTabs(){
  var el=document.getElementById('lang-tabs');el.innerHTML='';
  ['kr','en','jp'].forEach(function(lang){
    var btn=document.createElement('button');btn.textContent=LD[lang].tab;
    var a=lang===G.lang;
    btn.style.cssText='flex:1;padding:8px;background:'+(a?'rgba(255,140,0,0.15)':'transparent')+';border:'+(a?'1px solid #ff8c0066':'1px solid transparent')+';border-radius:6px;color:'+(a?'#ff8c00':'#6a4a00')+';cursor:pointer;font-size:0.8rem;font-family:Georgia,serif;';
    btn.addEventListener('click',function(){G.lang=lang;lsSet(LS.lang,lang);renderAll();});
    el.appendChild(btn);
  });
}

function renderHeader(){
  var d=LD[G.lang];
  document.getElementById('header').innerHTML=
    '<div style="font-size:0.65rem;letter-spacing:5px;color:#ff8c00;margin-bottom:4px;text-shadow:0 0 10px #ff8c00;">KING OF WANDS BRIDE — STAGE 4</div>'+
    '<div style="font-size:1.3rem;color:#ff8c00;letter-spacing:1px;text-shadow:0 0 8px #ff8c00;">'+d.title+'</div>'+
    '<div style="font-size:0.6rem;color:#3a2000;margin-top:2px;">'+d.subtitle+'</div>';
}

function renderBride(){
  var el=document.getElementById('bride-panel');
  var state=getBrideState();var oe=Math.round(G.hunger);
  var barColor=G.hunger<40?'#ff8c00':G.hunger<70?'#ff4400':'#ff2200';
  el.style.border='1px solid '+state.c+'66';
  el.innerHTML=
    '<div style="font-size:3.5rem;line-height:1;margin-bottom:8px;filter:drop-shadow(0 0 14px '+state.c+')">'+state.e+'</div>'+
    '<div style="font-size:0.85rem;color:'+state.c+';margin-bottom:6px;letter-spacing:1px;text-shadow:0 0 8px '+state.c+';">'+state.s+'</div>'+
    '<div style="font-size:0.6rem;color:#ff8c0066;margin-bottom:10px;letter-spacing:2px;">'+L('heightLabel')+'</div>'+
    '<div style="display:flex;justify-content:space-between;font-size:0.7rem;color:#6a4a00;margin-bottom:4px;"><span>'+L('hunger')+'</span><span style="color:'+(G.hunger>70?'#ff2200':'#ff8c00')+'">'+oe+'%</span></div>'+
    '<div style="height:8px;background:rgba(255,140,0,0.1);border-radius:4px;overflow:hidden;"><div style="height:100%;width:'+oe+'%;background:'+barColor+';border-radius:4px;transition:width 0.4s,background 0.4s;box-shadow:0 0 6px '+barColor+';"></div></div>'+
    '<div style="margin-top:8px;font-size:0.62rem;color:#3a2000;">대접 '+G.fedCount+'회 | 스테이지 5 해금: 1100회</div>';
}

function renderStats(){
  var d=LD[G.lang];
  document.getElementById('stats').innerHTML=
    '<div style="display:flex;justify-content:space-around;">'+
    [{label:d.funds,val:'💰 '+G.money.toFixed(1)+d.unit,color:'#ff8c00'},
     {label:d.income,val:'📈 '+G.income+d.perSec,color:'#ff6600'},
     {label:d.fed,val:'🍽 '+G.fedCount,color:'#ffb347'}]
    .map(function(s){return '<div style="text-align:center;"><div style="font-size:0.65rem;color:#3a2000;">'+s.label+'</div><div style="font-size:0.95rem;color:'+s.color+';text-shadow:0 0 6px '+s.color+';">'+s.val+'</div></div>';})
    .join('')+'</div>';
}

function renderFoods(){
  var labelEl=document.getElementById('food-label');
  var gridEl=document.getElementById('food-grid');
  var d=LD[G.lang];
  labelEl.textContent=d.foodSec;
  gridEl.innerHTML='';
  getFoods().forEach(function(food){
    var canAfford=G.money>=food.cost;
    var btn=document.createElement('button');btn.className='food-btn';
    btn.style.cssText='background:'+(canAfford?'rgba(255,140,0,0.05)':'rgba(0,0,0,0.2)')+';border-color:'+(canAfford?'rgba(255,140,0,0.3)':'rgba(80,40,0,0.3)')+';color:'+(canAfford?'#e8dcc8':'#3a2000')+';opacity:'+(canAfford?'1':'0.45')+';cursor:'+(canAfford&&!G.gameOver?'pointer':'not-allowed')+';';
    if(G.gameOver)btn.disabled=true;
    btn.innerHTML='<div style="font-size:1.3rem;">'+food.emoji+'</div><div style="font-weight:bold;margin-top:2px;font-size:0.75rem;">'+food.name+'</div><div style="font-size:0.65rem;color:#ff8c0066;">'+food.cost+d.unit+' | '+Math.abs(food.hunger)+'%↓</div>';
    btn.addEventListener('click',function(){feedFood(food);});
    gridEl.appendChild(btn);
  });
}

function renderUpgrades(){
  var labelEl=document.getElementById('upgrade-label');
  var listEl=document.getElementById('upgrade-list');
  var d=LD[G.lang];
  labelEl.textContent=d.upgSec;
  listEl.innerHTML='';
  UPGRADES.forEach(function(up){
    var owned=!!G.upgrades[up.id];var canBuy=!owned&&G.money>=up.cost&&!G.gameOver;
    var btn=document.createElement('button');btn.className='upgrade-btn';
    btn.style.cssText='background:'+(owned?'rgba(255,140,0,0.08)':canBuy?'rgba(255,140,0,0.03)':'rgba(0,0,0,0.2)')+';border-color:'+(owned?'rgba(255,140,0,0.4)':canBuy?'rgba(255,140,0,0.2)':'rgba(80,40,0,0.2)')+';color:'+(owned?'#ff8c00':canBuy?'#e8dcc8':'#3a2000')+';cursor:'+(canBuy?'pointer':'not-allowed')+';width:100%;';
    if(!canBuy)btn.disabled=true;
    btn.innerHTML='<div style="text-align:left;"><div style="font-weight:bold;">'+(owned?'✓ ':'')+loc(up.name)+'</div><div style="font-size:0.65rem;color:'+(owned?'#ff8c00':'#6a4a00')+';">'+loc(up.desc)+'</div></div>'+(!owned?'<div style="font-size:0.75rem;color:#ff8c0088;">'+up.cost+d.unit+'</div>':'');
    btn.addEventListener('click',function(){buyUpgrade(up);});
    listEl.appendChild(btn);
  });
}

function renderLog(){
  var d=LD[G.lang];
  document.getElementById('log-label').textContent=d.logSec;
  var entriesEl=document.getElementById('log-entries');
  entriesEl.innerHTML=G.logs.map(function(log,i){
    var isLast=i===G.logs.length-1;
    return '<div style="font-size:0.72rem;color:'+(isLast?'#ff8c00':'#3a2000')+';margin-bottom:2px;">'+log+'</div>';
  }).join('');
  document.getElementById('log-box').scrollTop=9999;
}

function renderGameOver(){
  var el=document.getElementById('gameover');var d=LD[G.lang];
  if(G.gameOver){
    el.style.display='flex';
    document.getElementById('go-title').textContent=d.goTitle;
    document.getElementById('go-sub').textContent=d.goSub;
    document.getElementById('go-stats').textContent=d.goStats(G.totalEarned.toFixed(0),G.fedCount);
    document.getElementById('go-restart').textContent=d.restart;
  }else{el.style.display='none';}
}

// ── 초기화 ──
document.getElementById('go-restart').addEventListener('click',restartGame);

playIntro(function(){
  G.hunger=25;
  G.logs=[L('s5enter'),LD[G.lang].quote];
  renderAll();
  setInterval(gameLoop,1000);
  setInterval(randomLog,9000);
});

})();
</script>
</body>
</html>
